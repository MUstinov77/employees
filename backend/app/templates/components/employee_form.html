{# templates/components/employee_form.html #}

<form
        method="{{ method }}"
        enctype="multipart/form-data"
        action="{{ action }}"
        class="space-y-8"
>

    <div class="grid gap-8 lg:grid-cols-3">

        <!-- Фото -->

        <div class="rounded-xl bg-white p-6 shadow-md">

            <h2 class="mb-6 text-lg font-semibold">
                Фотография
            </h2>

            <div class="flex flex-col items-center">

                {% if employee and employee.photo %}

                    <img
                            id="photo-preview"
                            src="/api/photo/{{ employee.photo.id }}/file"
                            class="mb-4 h-52 w-52 rounded-xl border object-cover"
                    >

                {% else %}

                    <img
                            id="photo-preview"
                            src="/static/img/no-photo.png"
                            class="mb-4 h-52 w-52 rounded-xl border object-cover"
                    >

                {% endif %}

                <input
                        id="photo"
                        name="file"
                        type="file"
                        accept="image/*"
                        class="block w-full rounded-lg border border-slate-300 file:mr-4 file:rounded-lg file:border-0 file:bg-blue-600 file:px-4 file:py-2 file:text-white hover:file:bg-blue-700"
                >

                <p class="mt-3 text-sm text-slate-500">
                    Максимальный размер файла — 200 КБ
                </p>

            </div>

        </div>

        <!-- Данные -->

        <div class="lg:col-span-2 rounded-xl bg-white p-6 shadow-md">

            <h2 class="mb-6 text-lg font-semibold">
                Личные данные
            </h2>

            <div class="grid gap-6">

                <!-- Фамилия -->

                <div>

                    <label class="mb-2 block font-medium">

                        Фамилия *

                    </label>

                    <input
                            type="text"
                            name="lastname"
                            required
                            value="{{ employee.last_name if employee else '' }}"
                            class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                    >

                </div>

                <!-- Имя -->

                <div>

                    <label class="mb-2 block font-medium">

                        Имя *

                    </label>

                    <input
                            type="text"
                            name="first_name"
                            required
                            value="{{ employee.first_name if employee else '' }}"
                            class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                    >

                </div>

                <!-- Отчество -->

                <div>

                    <label class="mb-2 block font-medium">

                        Отчество

                    </label>

                    <input
                            type="text"
                            name="surname"
                            value="{{ employee.surname if employee else '' }}"
                            class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                    >

                </div>

                <!-- Телефон -->

                <div>

                    <label class="mb-2 block font-medium">

                        Телефон *

                    </label>

                    <input
                            type="tel"
                            name="phone_number"
                            required
                            placeholder="+79991234567"
                            value="{{ employee.phone_number if employee else '' }}"
                            class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                    >

                </div>

                <!-- Дата рождения -->

                <div>

                    <label class="mb-2 block font-medium">

                        Дата рождения *

                    </label>

                    <input
                            id="birth_date"
                            name="date_of_birth"
                            required
                            type="text"
                            value="{{ employee.date_of_birth if employee else '' }}"
                            class="w-full rounded-lg border border-slate-300 px-4 py-3"
                    >

                </div>

                <!-- Пол -->

                <div>

                    <label class="mb-2 block font-medium">

                        Пол *

                    </label>

                    <select
                            name="sex"
                            required
                            class="w-full rounded-lg border border-slate-300 px-4 py-3"
                    >

                        <option value="">
                            Выберите пол
                        </option>

                        <option
                                value="Муж."
                                {% if employee and employee.sex=='Муж.' %}
                                selected
                                {% endif %}
                        >
                            Мужской
                        </option>

                        <option
                                value="Жен."
                                {% if employee and employee.sex=="Жен." %}
                                selected
                                {% endif %}
                        >
                            Женский
                        </option>

                    </select>

                </div>

            </div>

            {% if errors %}

                <div class="mt-8 rounded-lg border border-red-200 bg-red-50 p-4">

                    <h3 class="mb-2 font-semibold text-red-700">
                        Ошибки:
                    </h3>

                    <ul class="list-disc pl-5 text-red-600">

                        {% for error in errors %}

                            <li>{{ error }}</li>

                        {% endfor %}

                    </ul>

                </div>

            {% endif %}

            <div class="mt-10 flex justify-end gap-4">

                <a
                        href="/employees"
                        class="rounded-lg border border-slate-300 px-6 py-3 font-medium hover:bg-slate-100"
                >
                    Отмена
                </a>

                <button
                        type="submit"
                        class="rounded-lg bg-blue-600 px-8 py-3 font-medium text-white hover:bg-blue-700"
                >
                    {{ submit_text }}
                </button>

            </div>

        </div>

    </div>

</form>
